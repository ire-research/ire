name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we trigger this?
      placeholder: |
        1. Open a workspace
        2. Switch to Experiment mode
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: IRE version
      description: Found in Settings, or run `git rev-parse --short HEAD` if running from source.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "e.g. macOS 15.4 (Apple Silicon), Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output, stack traces, or attach screenshots. Experiment logs live under `.ire/wiki/experiments/<uuid>/`.
      render: shell
