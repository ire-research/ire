name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      release: ${{ startsWith(github.ref, 'refs/tags/') }}
    secrets: inherit
