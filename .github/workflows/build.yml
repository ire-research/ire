name: Build

on:
  workflow_call:
    inputs:
      release:
        description: Run the signed Tauri release build instead of a dev build
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Only the dev build (main) saves; release builds (tags) restore via
          # the default-branch fallback, since a tag ref can never be read back.
          save-if: ${{ !inputs.release }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Patch version from tag
        if: inputs.release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        if: "!inputs.release"
        run: npm run build

      - name: Build Rust (dev)
        if: "!inputs.release"
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Upload dev build artifact
        if: "!inputs.release"
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ matrix.platform }}
          path: src-tauri/target/release/ire*
          retention-days: 3
          if-no-files-found: warn

      - name: Build Tauri app
        if: inputs.release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "IRE ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
